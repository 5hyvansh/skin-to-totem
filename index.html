<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Akshu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    z-index:10;
    padding:20px;
    max-width:800px;
}

h1{
    font-size:4rem;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.08);
    }
}

#typing{
    color:white;
    font-size:1.4rem;
    margin-top:20px;
    min-height:40px;
    text-shadow:0 0 10px rgba(255,255,255,0.5);
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f81;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,0.6);
    transition:0.4s;
}

button:hover{
    transform:scale(1.1);
}

#letter{
    margin-top:25px;
    color:white;
    font-size:1.2rem;
    line-height:1.8;
    display:none;
    animation:fade 1s;
    text-shadow:0 0 10px rgba(255,255,255,0.5);
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-100px;
    color:white;
    user-select:none;
    animation:float linear infinite;
}

@keyframes float{
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>Love You Akshu ❤️</h1>

    <div id="typing"></div>

    <button onclick="showLetter()">
        💌 Click Here Bandriyaaa
    </button>

    <div id="letter">
        Love You Meri Bandriyaaaa ❤️<br><br>

        You are very very very important, Bandriyaaa, for me. 🥺💖<br><br>

        Haan, thodi moti ho aap, lekin phir bhi meri zaan ho aap, samjhi? 😘❤️<br><br>

        Lobeeee Uhhhhhhh, Bacha! 🫶💕
    </div>

</div>

<!-- Background Music -->
<audio id="music" loop>
    <source src="Aaj Se Teri-1-Downringtone.com.mp3" type="audio/mpeg">
</audio>

<script>
// Music (plays after first click anywhere)
document.body.addEventListener('click', () => {
    document.getElementById('music').play();
}, { once:true });

// Typing Animation
const text = "You make my world brighter ✨ Every moment with you is special ❤️";
let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 60);
    }
}
type();

// Show Love Message
function showLetter(){
    document.getElementById("letter").style.display = "block";
}

// Floating Hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 10000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
